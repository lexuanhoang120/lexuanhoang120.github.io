<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio of Le Xuan Hoang, an AI researcher and data scientist focused on computer vision, vision-language models, and forecasting systems." />
  <title>LE XUAN HOANG | Applied AI Researcher & Data Scientist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="grid-noise"></span>
  </div>

  <header class="site-header">
    <nav class="container">
      <a class="logo" href="#top">LE XUAN HOANG</a>
      <div class="nav-links"></div>
      <div class="lang-switcher" role="group" aria-label="Select language">
        <button class="lang-btn active" data-lang="en" aria-pressed="true" aria-label="English">EN</button>
        <button class="lang-btn" data-lang="ko" aria-pressed="false" aria-label="Korean">한</button>
        <button class="lang-btn" data-lang="vi" aria-pressed="false" aria-label="Vietnamese">VI</button>
      </div>
    </nav>
  </header>

  <main id="top">
    <section class="hero-wrap">
      <div class="container hero">
        <div>
          <div class="eyebrow hero-eyebrow"></div>
          <h1 class="hero-heading"></h1>
          <p class="hero-description"></p>
          <div class="actions hero-actions"></div>
        </div>

        <aside class="profile-card reveal">
          <div class="profile-photo">
            <img src="images/myphoto.jpg" alt="Portrait of Le Xuan Hoang" />
          </div>
          <!-- <h2>Recruiter Snapshot</h2> -->
          <div class="profile-list"></div>
        </aside>
      </div>
    </section>

    <section id="projects">
      <div class="container">
        <h2 class="section-title"></h2>
        <p class="section-subtitle"></p>
        <div class="project-grid"></div>
      </div>
    </section>

    <section id="experience">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="timeline"></div>
      </div>
    </section>

    <section id="education">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="education-list"></div>
      </div>
    </section>

    <section id="cv">
      <div class="container">
        <h2 class="section-title"></h2>
        <p class="section-subtitle"></p>
        <div class="cv-panel reveal">
          <div class="cv-summary"></div>
          <div class="cv-actions actions"></div>
        </div>
        <div class="cv-preview reveal">
          <iframe
            src="docs/HOANG_CV.pdf#view=FitH"
            title="Le Xuan Hoang CV PDF"
            loading="lazy"
          ></iframe>
          <p class="cv-fallback"></p>
        </div>
      </div>
    </section>

    <section id="skills">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="skills"></div>
      </div>
    </section>

    <section id="references">
      <div class="container">
        <h2 class="section-title"></h2>
        <p class="section-subtitle"></p>
        <div class="grid references-grid"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <h2 class="section-title"></h2>
        <p class="section-subtitle"></p>
        <div class="actions"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container"></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
